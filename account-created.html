<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Created — ArmBarn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00AE48;
      --green-dark: #00892e;
      --green-dim: rgba(0, 174, 72, 0.15);
      --bg: #111;
      --text: #f0f0f0;
      --text-muted: #888;
      --border: rgba(255,255,255,0.07);
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 55% at 50% 45%, rgba(0,174,72,0.13) 0%, transparent 70%),
        radial-gradient(ellipse 30% 40% at 15% 80%, rgba(0,120,40,0.18) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      animation: fadeUp 0.7s ease both;
    }

    /* animated check ring */
    .check-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 32px;
      position: relative;
    }

    .check-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(0,174,72,0.3);
      background: rgba(0,174,72,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    .check-ring svg {
      width: 36px;
      height: 36px;
    }

    .check-ring svg polyline {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.4s ease 0.55s forwards;
    }

    /* pulse ring */
    .check-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(0,174,72,0.2);
      animation: pulse 2.5s ease 1s infinite;
    }

    .eyebrow {
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeUp 0.6s ease 0.35s both;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      display: inline-block;
      width: 28px;
      height: 2px;
      background: var(--green);
      border-radius: 2px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 0.95;
      margin-bottom: 20px;
      color: #fff;
      animation: fadeUp 0.6s ease 0.45s both;
    }

    h1 span { color: var(--green); }

    p {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 36px;
      animation: fadeUp 0.6s ease 0.55s both;
    }

    .btn {
      display: inline-block;
      background: var(--green);
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 36px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      animation: fadeUp 0.6s ease 0.65s both;
    }
    .btn:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.6; }
      70%  { transform: scale(1.35); opacity: 0; }
      100% { transform: scale(1.35); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="check-wrap">
      <div class="check-ring">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="7,19 15,27 29,10" stroke="#00AE48" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <div class="eyebrow">Success</div>
    <h1>Account<br><span>Created</span></h1>
    <p>You're all set. Launch the app and start charting pitches from the palm of your hand.</p>
    <a href="https://apps.apple.com/us/app/armbarn/id6503445937" class="btn">Download ArmBarn</a>
  </div>

</body>
</html>
